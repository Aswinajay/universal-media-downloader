# =====================================================
# FlashGet — Render.com Deployment Blueprint
# Deploy at: https://render.com/deploy
# =====================================================

services:

  - type: web
    name: flashget-api
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    plan: free          # Render.com free tier
    region: oregon      # or: ohio, singapore, frankfurt

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: YTDLP_PATH
        value: yt-dlp

    healthCheckPath: /health

    # Auto-deploy on every push to main branch
    autoDeploy: true
