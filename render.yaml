# =====================================================
# FlashGet — Render.com Deployment Blueprint
# =====================================================

services:

  - type: web
    name: flashget-api
    runtime: docker
    repo: https://github.com/Aswinajay/universal-media-downloader
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: YTDLP_PATH
        value: yt-dlp

    healthCheckPath: /health
    autoDeploy: true
